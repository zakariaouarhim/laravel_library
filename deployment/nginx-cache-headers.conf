# Static-asset cache headers for the Library Fokara nginx server block.
#
# Where to install:
#   /etc/nginx/sites-available/library_fokara
#   Paste the three location blocks below INSIDE the `server { ... }` block
#   that listens on 443, above the catch-all `location / { ... }`.
#
# IMPORTANT — sites-enabled/ must be a SYMLINK to sites-available/, NOT a
# separate copy of the file. If `ls -la /etc/nginx/sites-enabled/` shows a
# regular file (not `-> ...`), edits won't take effect:
#   sudo rm /etc/nginx/sites-enabled/library_fokara
#   sudo ln -s /etc/nginx/sites-available/library_fokara /etc/nginx/sites-enabled/library_fokara
#
# Apply:
#   sudo nginx -t && sudo systemctl reload nginx
#
# Verify on a real image URL:
#   curl -ksI "https://alfokara.com/images/logo.svg" | grep -iE 'cache-control|expires'
#   # Expect: Cache-Control: public, max-age=31536000, immutable + Expires ~ 1 year out
#
# Notes:
# - Extension-based matchers (\.(webp|jpg|...)$) catch assets regardless of
#   path, which is more robust than path-based matchers (^/images/...).
# - Book image filenames embed a timestamp + random suffix (ImageService.php),
#   so they're effectively content-addressed — safe to mark immutable.
# - CSS/JS filenames are NOT content-hashed. Views append ?v={{ filemtime() }}
#   on critical files; the 30-day max-age WITHOUT immutable lets stuck clients
#   recover. (Vite migration would unlock proper immutable caching on JS/CSS.)
# - The `expires 1y;` directive emits its own Cache-Control: max-age=... and
#   an Expires: header. With the explicit `add_header Cache-Control "..."`
#   you get two Cache-Control headers per response — browsers honor either,
#   the duplication is harmless. Drop `expires` if you want one clean header.

# Images: long cache, immutable
location ~* \.(webp|jpg|jpeg|png|gif|svg|ico|avif)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
}

# CSS/JS: shorter cache, NOT immutable
location ~* \.(css|js)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
    access_log off;
}

# Fonts: rarely change once shipped
location ~* \.(woff2?|ttf|eot|otf)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
}
